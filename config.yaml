api:
  chemrxiv_base_url: "https://api.figshare.com/v2/articles"
  user_agent: "LiveChemBench/1.2 (Research Project)"
  ncbi_api_key: "bc3cddf748fc822879de7e76bd20cadbbb09"

search:
  term: "chemistry"
  limit: 50
  date_range_days: 30

paths:
  raw_papers: "data/raw_papers"
  segmented_papers: "data/segmented_papers"

segmentation:
  max_key_points: 5
  min_section_chars: 50
  abstract_headings:
    - "abstract"
    - "summary"
    - "overview"
  conclusion_headings:
    - "conclusion"
    - "conclusions"
    - "concluding remarks"
    - "summary and conclusion"
    - "final remarks"
    - "summary and outlook"
    - "outlook"