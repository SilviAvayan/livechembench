# Lightweight CI: validates imports and Pydantic models.
# No Paddle/PaddleOCR (GPU required), no docling, no LLM calls.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pydantic>=2.0.0 pyyaml openai requests

      - name: Validate Pydantic models
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path('.').resolve()))
          from src.agents.models import (
              PaperQualityEvaluation, PaperQuestions, CandidateQuestion,
              PaperCritiqueReport, RepairedPaperQuestions, SelectedPaperQuestions,
              LiveChemBench, VerificationReport, EvalReport,
          )
          print('models: ok')
          "

      - name: Validate agent imports
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path('.').resolve()))
          import src.agents.paper_quality_evaluator
          import src.agents.question_proposer
          import src.agents.critics
          import src.agents.question_repairer
          import src.agents.novelty_selector
          import src.agents.dataset_builder
          import src.agents.answer_verifier
          import src.agents.model_evaluator
          print('all agents: ok')
          "

      - name: Validate prompt configs
        run: |
          python -c "
          import yaml
          from pathlib import Path
          required = [
              'paper_quality_evaluator', 'question_proposer',
              'critic_ill_defined', 'critic_missing_conditions',
              'critic_novelty', 'question_repairer', 'model_evaluator',
          ]
          for name in required:
              p = Path('prompts') / f'{name}.yaml'
              assert p.exists(), f'Missing prompt: {p}'
              cfg = yaml.safe_load(p.read_text())
              assert 'model' in cfg, f'Missing model in {p}'
              assert 'system_prompt' in cfg, f'Missing system_prompt in {p}'
          print('prompts: ok')
          "

      - name: Validate benchmark JSON
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path('.').resolve()))
          from src.agents.models import LiveChemBench
          for f in sorted(Path('data/benchmark').glob('*.json')):
              b = LiveChemBench.model_validate_json(f.read_text())
              print(f'{f.name}: {b.stats.total} question(s) ok')
          "
